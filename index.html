(function(){
	var vl = document.getElementById('vl');
	function hideLoader(){
		if(!vl) return;
		vl.classList.add('vl-hide');
		setTimeout(function(){ if(vl && vl.parentNode) vl.parentNode.removeChild(vl); }, 700);
	}
	var obs = new MutationObserver(function(){
		var stage = document.getElementById('Stage');
		if(stage && stage.children.length > 2){
			hideLoader();
			obs.disconnect();
		}
	});
	obs.observe(document.body, {childList:true, subtree:true});
	setTimeout(hideLoader, 12000);
})();
